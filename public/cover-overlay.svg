<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#050505" flood-opacity="0.7"/>
    </filter>
  </defs>

  <text x="600" y="150" text-anchor="middle" fill="#f5f2e8"
        font-family="Bebas Neue, Anton, Oswald, Impact, sans-serif"
        font-weight="800" font-size="120" letter-spacing="4"
        filter="url(#shadow)">Making walks not suck.</text>

  <line x1="450" y1="240" x2="750" y2="240" stroke="#ff3b1f" stroke-width="4" filter="url(#shadow)"/>

  <text x="600" y="470" text-anchor="middle" fill="#f5f2e8"
        font-family="Bebas Neue, Anton, Oswald, Impact, sans-serif"
        font-weight="800" font-size="230" letter-spacing="24"
        filter="url(#shadow)">STADIUM</text>

  <text x="600" y="560" text-anchor="middle" fill="#f5f2e8"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="40" letter-spacing="14"
        fill-opacity="0.85" filter="url(#shadow)">A LIVE AI SPORTS BROADCAST</text>
</svg>
